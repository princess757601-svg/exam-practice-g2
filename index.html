<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>二年級期末總複習</title>
<style>
  html,body{margin:0;padding:0;height:100%;background:#eef3f8;font-family:"Microsoft JhengHei","PingFang TC","Noto Sans TC","Segoe UI",sans-serif;}
  #modebar{display:flex;gap:8px;padding:8px 10px;background:#3a4250;position:sticky;top:0;z-index:10;}
  #modebar button{flex:1;border:none;border-radius:12px;padding:12px 6px;font-size:clamp(15px,4vw,18px);font-weight:800;font-family:inherit;color:#fff;cursor:pointer;background:#6b7585;transition:transform .08s;}
  #modebar button:active{transform:translateY(2px);}
  #modebar #bPractice.on{background:linear-gradient(#ff8fab,#e05f86);}
  #modebar #bExam.on{background:linear-gradient(#5ec5e6,#2f9fc4);}
  #frame{display:block;width:100%;border:0;height:calc(100vh - 58px);background:#fff;}
</style>
</head>
<body>
<div id="modebar">
  <button id="bPractice" class="on">🌈 闖關練習</button>
  <button id="bExam">📄 考卷模擬考</button>
</div>
<iframe id="frame" title="二年級學習"></iframe>
<script id="srcPractice" type="text/plain">
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>二年級期末闖關練習｜國語 × 數學</title>
<style>
  :root{
    --bg1:#fef6e4; --bg2:#e0f7fa;
    --pink:#ff8fab; --pink-d:#e05f86;
    --blue:#5ec5e6; --blue-d:#2f9fc4;
    --green:#7ed957; --green-d:#56b82e;
    --yellow:#ffd23f; --orange:#ff9f45;
    --purple:#b388eb; --purple-d:#8a5fd6;
    --ink:#384150; --card:#ffffff;
    --ok:#38b000; --no:#ef476f;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:"Microsoft JhengHei","PingFang TC","Noto Sans TC","Segoe UI",sans-serif;
    color:var(--ink);
    background:linear-gradient(160deg,var(--bg1),var(--bg2));
    min-height:100vh;
    -webkit-text-size-adjust:100%;
  }
  .wrap{max-width:760px; margin:0 auto; padding:14px 14px 60px;}
  /* ---- Header ---- */
  header{text-align:center; padding:10px 0 4px;}
  header h1{
    font-size:clamp(22px,5vw,30px); margin:6px 0 2px;
    color:var(--pink-d); text-shadow:1px 2px 0 #fff;
  }
  header p{margin:0; color:#7a8190; font-size:14px;}
  /* ---- Subject tabs ---- */
  .tabs{display:flex; gap:10px; margin:14px 0;}
  .tab{
    flex:1; border:none; cursor:pointer; font-family:inherit;
    padding:14px 6px; border-radius:18px; font-size:clamp(17px,4.5vw,22px); font-weight:800;
    color:#fff; box-shadow:0 4px 0 rgba(0,0,0,.12); transition:transform .08s;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .tab:active{transform:translateY(2px);}
  .tab.chinese{background:linear-gradient(var(--pink),var(--pink-d));}
  .tab.math{background:linear-gradient(var(--blue),var(--blue-d));}
  .tab.off{filter:grayscale(.55) brightness(1.05); box-shadow:0 4px 0 rgba(0,0,0,.08); opacity:.7;}
  /* ---- Cards grid ---- */
  .grid{display:grid; grid-template-columns:repeat(2,1fr); gap:12px;}
  .ucard{
    border:none; cursor:pointer; font-family:inherit; text-align:left;
    background:var(--card); border-radius:18px; padding:16px 14px;
    box-shadow:0 4px 14px rgba(80,90,120,.14); transition:transform .08s;
    display:flex; flex-direction:column; gap:6px; min-height:96px;
  }
  .ucard:active{transform:scale(.97);}
  .ucard .emoji{font-size:30px;}
  .ucard .uname{font-size:clamp(15px,3.8vw,18px); font-weight:800;}
  .ucard .ucount{font-size:12px; color:#9aa1b0;}
  .ucard.hot{outline:3px solid var(--yellow); position:relative;}
  .ucard.hot::after{content:"★重點"; position:absolute; top:-10px; right:8px; background:var(--orange); color:#fff; font-size:11px; font-weight:800; padding:2px 8px; border-radius:10px;}
  /* ---- Level buttons ---- */
  .levels{display:flex; flex-direction:column; gap:14px; margin-top:8px;}
  .level{
    border:none; cursor:pointer; font-family:inherit; color:#fff; font-weight:800;
    border-radius:20px; padding:20px; font-size:20px; box-shadow:0 5px 0 rgba(0,0,0,.13);
    display:flex; align-items:center; justify-content:space-between; transition:transform .08s;
  }
  .level:active{transform:translateY(2px);}
  .level small{font-weight:600; font-size:13px; opacity:.95;}
  .lv-basic{background:linear-gradient(var(--green),var(--green-d));}
  .lv-adv{background:linear-gradient(var(--orange),#e07a1f);}
  .lv-chal{background:linear-gradient(var(--purple),var(--purple-d));}
  /* ---- Quiz ---- */
  .qtop{display:flex; align-items:center; gap:10px; margin:6px 0 12px;}
  .progress{flex:1; height:14px; background:#e7ecf3; border-radius:10px; overflow:hidden;}
  .bar{height:100%; width:0; background:linear-gradient(90deg,var(--green),var(--yellow)); transition:width .3s;}
  .score{font-weight:800; color:var(--orange); white-space:nowrap;}
  .qcard{
    background:var(--card); border-radius:22px; padding:22px 18px;
    box-shadow:0 6px 18px rgba(80,90,120,.15);
  }
  .qmeta{font-size:13px; color:#9aa1b0; margin-bottom:6px;}
  .qhead{display:flex; align-items:flex-start; gap:10px; margin-bottom:18px;}
  .qtext{font-size:clamp(19px,5vw,24px); font-weight:800; line-height:1.6; flex:1;}
  .readbtn{
    flex-shrink:0; border:none; cursor:pointer; font-family:inherit; font-weight:800;
    background:linear-gradient(var(--purple),var(--purple-d)); color:#fff;
    border-radius:14px; padding:10px 12px; font-size:15px; box-shadow:0 3px 0 rgba(0,0,0,.13);
    display:flex; flex-direction:column; align-items:center; gap:2px; line-height:1.1; white-space:nowrap;
  }
  .readbtn:active{transform:translateY(2px);}
  .readbtn small{font-size:10px; font-weight:700; opacity:.95;}
  .readbtn.speaking{animation:pulse .7s infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);} 50%{transform:scale(1.08);}}
  .opts{display:flex; flex-direction:column; gap:12px;}
  .opt{
    border:3px solid #e7ecf3; background:#fbfcff; cursor:pointer; font-family:inherit;
    border-radius:16px; padding:16px; font-size:clamp(18px,4.6vw,22px); font-weight:700; text-align:left;
    color:var(--ink); transition:transform .06s, background .15s, border-color .15s;
    display:flex; align-items:center; gap:12px;
  }
  .opt:active{transform:scale(.98);}
  .opt .badge{
    width:30px; height:30px; border-radius:50%; background:var(--blue); color:#fff;
    display:flex; align-items:center; justify-content:center; font-weight:800; flex-shrink:0; font-size:16px;
  }
  .opt.correct{border-color:var(--ok); background:#e9ffe1;}
  .opt.correct .badge{background:var(--ok);}
  .opt.wrong{border-color:var(--no); background:#ffe7ee;}
  .opt.wrong .badge{background:var(--no);}
  .opt.dim{opacity:.5;}
  .feedback{margin-top:16px; border-radius:16px; padding:14px; font-size:16px; font-weight:700; display:none; line-height:1.55;}
  .feedback.show{display:block; animation:pop .25s;}
  .feedback.good{background:#e9ffe1; color:#2c7a18; border:2px solid #b6e8a3;}
  .feedback.bad{background:#fff2f6; color:#b3284e; border:2px solid #ffc2d4;}
  .feedback .explain{display:block; margin-top:6px; font-weight:600; color:#5a6373;}
  @keyframes pop{from{transform:scale(.85); opacity:0;} to{transform:scale(1); opacity:1;}}
  .nextbtn{
    margin-top:16px; width:100%; border:none; cursor:pointer; font-family:inherit;
    background:linear-gradient(var(--blue),var(--blue-d)); color:#fff; font-weight:800;
    border-radius:16px; padding:16px; font-size:20px; box-shadow:0 4px 0 rgba(0,0,0,.13);
    display:none;
  }
  .nextbtn.show{display:block;}
  .nextbtn:active{transform:translateY(2px);}
  /* ---- Result ---- */
  .result{background:var(--card); border-radius:24px; padding:28px 20px; text-align:center; box-shadow:0 6px 18px rgba(80,90,120,.15);}
  .result .big{font-size:64px; line-height:1;}
  .result h2{font-size:26px; margin:10px 0 4px; color:var(--pink-d);}
  .result .stars{font-size:40px; letter-spacing:4px; margin:8px 0;}
  .result .msg{font-size:17px; color:#5a6373; margin-bottom:18px;}
  .result .rscore{font-size:20px; font-weight:800; color:var(--orange);}
  /* ---- Back / nav ---- */
  .backbar{display:flex; gap:10px; margin:4px 0 12px;}
  .backbtn{
    border:none; cursor:pointer; font-family:inherit; background:#fff; color:var(--ink);
    font-weight:800; border-radius:14px; padding:10px 16px; font-size:15px;
    box-shadow:0 3px 8px rgba(80,90,120,.12);
  }
  .backbtn:active{transform:translateY(1px);}
  .sectitle{font-size:clamp(18px,4.5vw,22px); font-weight:800; margin:6px 0 12px; color:var(--ink); display:flex; align-items:center; gap:8px;}
  .hint{background:#fff7e0; border:2px solid #ffe39a; border-radius:14px; padding:10px 14px; font-size:14px; color:#8a6d1a; margin-bottom:12px; line-height:1.6;}
  .hide{display:none !important;}
  #screenUnits, #screenQuiz, #screenResult{animation:fadein .22s ease;}
  @keyframes fadein{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}
  .floaty{position:fixed; pointer-events:none; font-size:34px; animation:rise 1.1s ease-out forwards; z-index:99;}
  @keyframes rise{from{transform:translateY(0) scale(.6); opacity:1;} to{transform:translateY(-160px) scale(1.3); opacity:0;}}
  footer{text-align:center; color:#aab; font-size:12px; margin-top:24px;}
  .toggles{position:fixed; top:10px; right:12px; display:flex; gap:8px; z-index:50;}
  .tgbtn{background:#fff; border:none; border-radius:50%; width:42px; height:42px; font-size:19px; cursor:pointer; box-shadow:0 3px 8px rgba(80,90,120,.18); position:relative;}
  .tgbtn.off{opacity:.45;}
  .tgbtn .tglbl{position:absolute; bottom:-15px; left:50%; transform:translateX(-50%); font-size:9px; color:#7a8190; white-space:nowrap; font-weight:700;}
  /* ---- 手寫單元卡標記 ---- */
  .ucard.pen{outline:3px solid var(--blue); position:relative;}
  .ucard.pen::after{content:"✍️手寫"; position:absolute; top:-10px; right:8px; background:var(--blue-d); color:#fff; font-size:11px; font-weight:800; padding:2px 8px; border-radius:10px;}
  /* ---- 難度小標籤 ---- */
  .diffbadge{display:inline-block; font-size:12px; font-weight:800; padding:2px 8px; border-radius:8px; margin-left:6px; color:#fff; vertical-align:middle;}
  .db-basic{background:var(--green-d);} .db-adv{background:#e07a1f;} .db-chal{background:var(--purple-d);}
  /* ---- 手寫板 ---- */
  .penbar{display:flex; gap:8px; margin-bottom:8px; flex-wrap:wrap;}
  .pentool{border:2px solid #e7ecf3; background:#fff; border-radius:12px; padding:9px 14px; font-family:inherit; font-weight:700; font-size:16px; cursor:pointer;}
  .pentool.on{background:var(--blue); color:#fff; border-color:var(--blue-d);}
  #padCanvas{width:100%; height:240px; border-radius:16px; border:3px dashed #cdd6e2; touch-action:none; display:block;
    background:
      linear-gradient(#f3b6c8,#f3b6c8) center center/100% 2px no-repeat,
      linear-gradient(#f3b6c8,#f3b6c8) center center/2px 100% no-repeat,
      #fffef9;
  }
  .revealbtn{margin-top:12px; width:100%; border:none; cursor:pointer; font-family:inherit; background:linear-gradient(var(--yellow),var(--orange)); color:#7a4a00; font-weight:800; border-radius:14px; padding:14px; font-size:18px; box-shadow:0 4px 0 rgba(0,0,0,.12);}
  .revealbtn:active{transform:translateY(2px);}
  .answerbox{margin-top:14px; text-align:center;}
  .answerbox .anslbl{font-size:14px; color:#9aa1b0;}
  .answerbox .ansbig{font-size:50px; font-weight:800; color:var(--pink-d); letter-spacing:6px; margin:8px 0; line-height:1.2;}
  .answerbox .ansexp{font-size:15px; color:#5a6373; margin-top:4px;}
  .selfcheck{display:flex; gap:10px; margin-top:14px;}
  .selfcheck button{flex:1; border:none; cursor:pointer; font-family:inherit; font-weight:800; border-radius:14px; padding:15px; font-size:17px; box-shadow:0 4px 0 rgba(0,0,0,.12); color:#fff;}
  .selfcheck button:active{transform:translateY(2px);}
  .sc-ok{background:linear-gradient(var(--green),var(--green-d));}
  .sc-retry{background:linear-gradient(var(--orange),#e07a1f);}
  /* 改錯字：圈出錯字 */
  .fixwrap{background:#fff; border:2px solid #e7ecf3; border-radius:14px; padding:16px; margin-bottom:6px;}
  .fixinstr{font-size:14px; color:#7a8190; margin-bottom:12px; font-weight:700; line-height:1.5;}
  .fixsentence{font-size:28px; line-height:1.9; display:flex; flex-wrap:wrap; gap:2px;}
  .fixchar{cursor:pointer; min-width:40px; height:42px; display:flex; align-items:center; justify-content:center; border:3px solid transparent; border-radius:8px; transition:transform .06s;}
  .fixchar:active{transform:scale(.85);}
  .fixchar.circled{border-color:var(--no); border-radius:50%; color:var(--no); font-weight:800;}
  .fixchar.nope{border-color:#ffc2d4; background:#fff2f6;}
  /* ---- 題目圖像 ---- */
  .qvisual{margin:0 0 16px;}
  .qvisual:empty{display:none;}
  /* 錢幣 */
  .coins{display:flex; flex-wrap:wrap; gap:8px; justify-content:center; padding:12px; background:#fff; border:2px solid #e7ecf3; border-radius:14px;}
  .coin{display:flex; align-items:center; justify-content:center; border-radius:50%; font-weight:800; color:#5a4a1a; box-shadow:0 2px 4px rgba(0,0,0,.18); border:2px solid rgba(0,0,0,.12);}
  .coin::after{content:"元"; font-size:10px; margin-left:1px;}
  .coin-50{width:58px; height:58px; background:radial-gradient(circle at 35% 30%,#ffe89a,#f5c531); font-size:19px;}
  .coin-10{width:50px; height:50px; background:radial-gradient(circle at 35% 30%,#eef2f6,#c7ccd3); font-size:16px;}
  .coin-5{width:44px; height:44px; background:radial-gradient(circle at 35% 30%,#f3c79c,#dd9a63); font-size:15px;}
  .coin-1{width:38px; height:38px; background:radial-gradient(circle at 35% 30%,#f0d6b0,#dcb887); font-size:14px;}
  /* 圖卡（應用題）*/
  .pics{background:#fff; border:2px solid #e7ecf3; border-radius:14px; padding:14px;}
  .picrow{font-size:30px; line-height:1.5; letter-spacing:3px; word-break:break-word;}
  .picnote{font-size:15px; color:#e0662f; margin-top:8px; font-weight:800;}
  /* 量量看 */
  .measure{background:#fff; border:2px solid #e7ecf3; border-radius:14px; padding:14px; overflow-x:auto;}
  .mrow{display:flex; align-items:center; gap:10px; margin-bottom:14px;}
  .mrow:last-child{margin-bottom:0;}
  .mlabel{font-size:15px; font-weight:800; white-space:nowrap; min-width:62px; color:var(--ink);}
  .munits{display:flex;}
  .munits .u{width:30px; text-align:center; font-size:21px; flex:0 0 30px; line-height:1.2;}
  /* 立體形體 */
  .solidbox{display:flex; justify-content:center; gap:20px; padding:14px; background:#fff; border:2px solid #e7ecf3; border-radius:14px; flex-wrap:wrap;}
  .solidbox .scap{text-align:center; font-weight:800; color:var(--blue-d); margin-top:4px; font-size:16px;}
  /* 分數圖 */
  .fracwrap{display:flex; gap:22px; justify-content:center; flex-wrap:wrap; background:#fff; border:2px solid #e7ecf3; border-radius:14px; padding:16px;}
  .fracfig{text-align:center;}
  .fbar{display:grid; width:210px; max-width:70vw; height:48px; border:3px solid #3a7aa6; border-radius:8px; overflow:hidden; margin:0 auto;}
  .fcell{border-right:2px solid #9ec9e8;}
  .fcell:last-child{border-right:none;}
  .fcell.on{background:var(--yellow);}
  .fraccap{margin-top:8px; font-weight:800; color:var(--blue-d); font-size:19px;}
</style>
</head>
<body>
<div class="toggles">
  <button class="tgbtn" id="soundBtn" title="音效開關">🔊<span class="tglbl">音效</span></button>
  <button class="tgbtn" id="autoReadBtn" title="自動念題">📢<span class="tglbl">自動念題</span></button>
</div>
<div class="wrap">
  <header>
    <h1 id="mainTitle">🌈 二年級期末闖關 🌈</h1>
    <p>國語 × 數學　✏️ 細心讀題目：先看清楚「誰、有幾個、要算什麼」再作答！</p>
  </header>

  <div class="tabs">
    <button class="tab chinese" id="tabChinese">📖 國語</button>
    <button class="tab math off" id="tabMath">🔢 數學</button>
  </div>

  <!-- 單元選擇 -->
  <section id="screenUnits">
    <div class="sectitle" id="unitsTitle">📖 選一個單元來練習</div>
    <div class="grid" id="unitsGrid"></div>
  </section>

  <!-- 答題 -->
  <section id="screenQuiz" class="hide">
    <div class="backbar"><button class="backbtn" id="quizBack">← 回單元</button></div>
    <div class="qtop">
      <div class="progress"><div class="bar" id="bar"></div></div>
      <div class="score" id="scoreLbl">⭐ 0</div>
    </div>
    <div class="qcard">
      <div class="qmeta" id="qmeta"></div>
      <div class="qhead">
        <div class="qtext" id="qtext"></div>
        <button class="readbtn" id="readBtn">🔈<small>念題目</small></button>
      </div>
      <div class="qvisual" id="qvisual"></div>
      <div class="fixwrap hide" id="fixchar">
        <div class="fixinstr">👆 點一下你覺得寫錯的字（會圈起來），再把正確的字寫在格子裡</div>
        <div class="fixsentence" id="fixSentence"></div>
      </div>
      <div class="opts" id="opts"></div>
      <div class="writepad hide" id="writepad">
        <div class="penbar">
          <button class="pentool" data-pen="ink">✏️ 筆</button>
          <button class="pentool" data-pen="erase">🧽 橡皮擦</button>
          <button class="pentool" id="clearPad">🗑️ 全部清除</button>
        </div>
        <canvas id="padCanvas"></canvas>
        <button class="revealbtn" id="revealBtn">👀 看答案</button>
        <div class="answerbox hide" id="answerBox"></div>
      </div>
      <div class="feedback" id="feedback"></div>
      <button class="nextbtn" id="nextBtn">下一題 →</button>
    </div>
  </section>

  <!-- 結算 -->
  <section id="screenResult" class="hide">
    <div class="result">
      <div class="big" id="resEmoji">🎉</div>
      <h2 id="resTitle">闖關完成！</h2>
      <div class="stars" id="resStars"></div>
      <div class="rscore" id="resScore"></div>
      <div class="msg" id="resMsg"></div>
      <div class="levels">
        <button class="level lv-basic" id="againBtn"><span>🔄 再玩一次</span><small>同一個單元再練習</small></button>
        <button class="level lv-chal" id="otherUnitBtn"><span>📚 換個單元</span><small>練習別的題目</small></button>
      </div>
    </div>
  </section>

  <footer>給最棒的你 💛 慢慢來，每題都是進步</footer>
</div>

<script>
/* =========================================================
   二年級下學期：南一國語 × 康軒數學
   題庫：依各校期末考卷題型整理（選擇／手寫／改錯字）＋ 數學隨機出題引擎
   每題：q 題目, o 選項, a 正解索引, e 小提示
   ========================================================= */
const BANK = {
chinese:{ label:"國語", emoji:"📖", units:[
  /* ---------- 量詞（重點）---------- */
  {id:"quan", name:"量詞的運用", emoji:"🏷️", hot:true, levels:{
    basic:[
      {q:"一（　）小路", o:["條","座","顆"], a:0, e:"路、河、魚用「條」：一條小路。"},
      {q:"一（　）公園", o:["座","條","張"], a:0, e:"公園、山、橋用「座」：一座公園。"},
      {q:"一（　）蘋果", o:["顆","棵","隻"], a:0, e:"圓圓的水果用「顆」：一顆蘋果。"},
      {q:"一（　）蘋果樹", o:["棵","顆","條"], a:0, e:"樹、草用「棵」：一棵蘋果樹。"},
      {q:"一（　）圖畫紙", o:["張","本","枝"], a:0, e:"紙、桌子用「張」：一張圖畫紙。"},
      {q:"一（　）甲蟲", o:["隻","頭","朵"], a:0, e:"小動物、昆蟲用「隻」：一隻甲蟲。"}

/* ---- 音效（瀏覽器內建，不需外部檔）---- */
let actx = null;
function beep(type){
  if(!soundOn) return;
  try{
    actx = actx || new (window.AudioContext||window.webkitAudioContext)();
    if(type==="good"){ [660,880,1175].forEach((f,i)=>tone(f,i*0.09,0.1,"triangle")); }
    else{ tone(200,0,0.18,"sawtooth"); tone(160,0.1,0.2,"sawtooth"); }
  }catch(e){}
}
function tone(freq,delay,dur,wave){
  const o=actx.createOscillator(), g=actx.createGain();
  o.type=wave; o.frequency.value=freq;
  o.connect(g); g.connect(actx.destination);
  const t=actx.currentTime+delay;
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(0.25,t+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.start(t); o.stop(t+dur+0.02);
}

/* ---- 語音念題（協助看不懂題目的孩子）---- */
const TTS = ('speechSynthesis' in window);
function pickVoice(){
  if(!TTS) return null;
  const vs = window.speechSynthesis.getVoices();
  return vs.find(v=>/zh[-_]?TW/i.test(v.lang))
      || vs.find(v=>/zh[-_]?(HK|CN)/i.test(v.lang))
      || vs.find(v=>/zh/i.test(v.lang)) || null;
}
if(TTS){ window.speechSynthesis.onvoiceschanged = pickVoice; }
function cleanForSpeech(t){
  return String(t)
    .replace(/＞/g,"大於").replace(/＜/g,"小於").replace(/＝/g,"等於")
    .replace(/✏️|🔈|👀|👆|🎯|🔎|👉|★|◎|〔|〕/g,"")
    .replace(/（　）/g,"，空格，").replace(/（/g,"（").trim();
}
function speak(text){
  if(!TTS) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(cleanForSpeech(text));
  u.lang = "zh-TW"; u.rate = 0.82; u.pitch = 1.05;
  const v = pickVoice(); if(v) u.voice = v;
  const btn = $("readBtn");
  u.onstart = ()=>{ if(btn) btn.classList.add("speaking"); };
  u.onend = ()=>{ if(btn) btn.classList.remove("speaking"); };
  u.onerror = ()=>{ if(btn) btn.classList.remove("speaking"); };
  window.speechSynthesis.speak(u);
}
function speakCurrent(){
  if(!TTS) return;
  const q = state.qlist[state.idx];
  let text;
  if(q.type==="two"){
    const stage = state.twoStage||1;
    const qq = (stage===1?q.q1:q.q2), oo = (stage===1?q.o1:q.o2);
    text = qq + "。選項：" + oo.map((o,i)=>("一二三四"[i]) + "、" + o).join("；");
  }
  else if(q.type==="fixchar"){ text = "請聽：" + q.s + "。這句話有一個字寫錯了，請圈出錯字，再把正確的字寫出來。"; }
  else { text = q.q; if(q.type==="choice" && q.o){ text += "。選項：" + q.o.map((o,i)=>("一二三四"[i]) + "、" + o).join("；"); } }
  speak(text);
}
$("readBtn").onclick = speakCurrent;

    const sub = u.pen ? "用筆寫寫看・每次隨機出題" : "每次隨機抽題練習";
    b.innerHTML = '<div class="emoji">'+u.emoji+'</div>'+
       '<div class="uname">'+u.name+'</div>'+
       '<div class="ucount">題庫 '+total+' 題・'+sub+'</div>';
    b.onclick = ()=>startUnit(u);
    grid.appendChild(b);
  });
}

/* ---- 工具 ---- */
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function rnd(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function mcq(q, ans, distractors, e, lv, fmt, vis){
  fmt = fmt || (x=>""+x);
  const set=[ans];
  for(const d of distractors){ if(set.length>=3) break; if(d!==ans && d>=0 && set.indexOf(d)<0) set.push(d); }
  let pad=1;
  while(set.length<3){ const c=ans+pad; if(c>=0 && set.indexOf(c)<0) set.push(c); pad = (pad>0)? -pad : (1-pad); }
  return {lv:lv||'adv', q, o:set.map(fmt), a:0, e, vis};
}
const CN = ['零','一','二','三','四','五','六','七','八','九','十'];

/* =========================================================
   隨機出題引擎：計算類數學每次生成全新題目，無限練習
   ========================================================= */
const GEN = {
  mul: ()=>Array.from({length:8},()=>{
    const a=rnd(2,9), b=rnd(2,9), ans=a*b;
    const T=[
      {q:a+" 的 "+b+" 倍是多少？", f:x=>""+x},
      {q:"1 盒有 "+a+" 顆糖，"+b+" 盒共有幾顆？", f:x=>x+"顆"},
      {q:"1 包有 "+a+" 張色紙，"+b+" 包共有幾張？", f:x=>x+"張"},
      {q:"1 排有 "+a+" 個座位，"+b+" 排共有幾個？", f:x=>x+"個"}
    ];
    const t=pick(T);
    return mcq(t.q, ans, [a+b, ans+a, Math.abs(ans-a)], a+"×"+b+"＝"+ans+"。", Math.random()<0.4?'chal':'adv', t.f);
  }),
  div: ()=>Array.from({length:8},()=>{
    const b=rnd(2,9), q0=rnd(2,9), a=b*q0;
    const T=[
      {q:"有 "+a+" 個蘋果，平分給 "+b+" 個人，每人分到幾個？", f:x=>x+"個"},

      {q:"有 "+a+" 本書，平分成 "+b+" 堆，每堆幾本？", f:x=>x+"本"},
      {q:"有 "+a+" 顆糖，每 "+b+" 顆裝 1 袋，可以裝幾袋？", f:x=>x+"袋"}
    ];
    const t=pick(T);
    return mcq(t.q, q0, [q0+1, Math.max(q0-1,1), b], a+"÷"+b+"＝"+q0+"。", Math.random()<0.4?'chal':'adv', t.f);
  }),
  len: ()=>Array.from({length:8},()=>{
    const kind=pick(['toCm','toMcm','compare','split','unit','unit']);
    if(kind==='toCm'){ const m=rnd(1,9), c=rnd(1,99), ans=m*100+c;
      return mcq(m+" 公尺 "+c+" 公分 ＝ 幾公分？", ans, [m*10+c, ans+100, ans-100], m+"公尺＝"+(m*100)+"公分，再加 "+c+"＝"+ans+"公分。", 'adv', x=>x+"公分"); }
    if(kind==='toMcm'){ const m=rnd(1,9), c=rnd(1,99), total=m*100+c, c2=(c>89?c-10:c+10);
      return {lv:'adv', q:total+" 公分 ＝ 幾公尺幾公分？", o:[m+"公尺"+c+"公分", (m+1)+"公尺"+c+"公分", m+"公尺"+c2+"公分"], a:0, e:"每 100 公分是 1 公尺，"+total+"公分＝"+m+"公尺"+c+"公分。"}; }
    if(kind==='compare'){ const m=rnd(1,5), c=rnd(1,60), left=m*100+c, right=(Math.random()<0.5? left-rnd(5,40): left+rnd(5,40));
      const sym = left>right?'＞':'＜';
      return {lv:'adv', q:"比大小："+m+"公尺"+c+"公分　(?)　"+right+"公分", o:['＞','＜','＝'], a:['＞','＜','＝'].indexOf(sym), e:m+"公尺"+c+"公分＝"+left+"公分，所以 "+left+sym+right+"。"}; }
    if(kind==='split'){ const seg=pick([2,4,5,10]), each=100/seg;
      return mcq("把 1 公尺（100 公分）平分成 "+seg+" 段，每段幾公分？", each, [each+5, each+10, seg], "100÷"+seg+"＝"+each+"公分。", 'adv', x=>x+"公分"); }
    const items=[['鉛筆的長','公分','14'],['數學課本的長','公分','26'],['書桌的寬','公分','50'],['水壺的高','公分','20'],['教室黑板的長','公尺','4'],['教室門的高','公尺','2'],['遊覽車的長','公尺','12'],['操場跑一圈','公尺','200']];
    const it=pick(items);
    return {lv:'basic', q:it[0]+"大約是 "+it[2]+" 公分還是 "+it[2]+" 公尺？", o:['公分','公尺'], a:['公分','公尺'].indexOf(it[1]), e:it[0]+"大約 "+it[2]+" "+it[1]+"。"};
  }),
  frac: ()=>Array.from({length:6},()=>{
    const kind=pick(['compare','name','parts']);
    if(kind==='compare'){
      let d1=rnd(2,8), d2=rnd(2,8); while(d2===d1) d2=rnd(2,8);
      const sym = d1<d2?'＞':'＜';
      return {lv:'adv',
        q:"看圖，這兩個分數各塗 1 份，哪一個比較大？",
        o:[CN[d1]+"分之一", CN[d2]+"分之一", "一樣大"], a:(d1<d2?0:1),
        e:"平分越多份每份越小。"+CN[d1]+"分之一 "+sym+" "+CN[d2]+"分之一。",
        vis:{type:'fraction',figs:[{d:d1,shaded:1,caption:CN[d1]+"分之一"},{d:d2,shaded:1,caption:CN[d2]+"分之一"}]}};
    }
    if(kind==='name'){
      const d=rnd(2,8), n=rnd(1,d-1), correct=CN[d]+"分之"+CN[n];
      return {lv:'adv', q:"看圖，塗色的部分是幾分之幾？",
        o:[correct, CN[n]+"分之"+CN[d], CN[d+1]+"分之"+CN[n]], a:0,
        e:"平分成 "+d+" 份，塗了 "+n+" 份，就是"+correct+"。",
        vis:{type:'fraction',figs:[{d:d,shaded:n}]}};
    }
    const d=rnd(3,9);
    return {lv:'adv', q:"一個披薩平分成 "+d+" 塊，每 1 塊是幾分之幾？",
      o:[CN[d]+"分之一","一分之"+CN[d], CN[d]+"分之"+CN[d]], a:0,
      e:"平分成"+d+"塊，1 塊就是"+CN[d]+"分之一。",
      vis:{type:'fraction',figs:[{d:d,shaded:1}]}};
  }),
  examM: ()=>Array.from({length:6},()=>{
    const T=[
      ()=>{const u=rnd(5,12),p=rnd(2,6),less=rnd(3,Math.min(u*p-1,15)),ans=u*p-less;return{q:"1 包有 "+u+" 張色紙，買了 "+p+" 包，用掉 "+less+" 張，還剩幾張？",ans,e:u+"×"+p+"＝"+(u*p)+"，"+(u*p)+"−"+less+"＝"+ans+"。",f:x=>x+"張"};},
      ()=>{const price=rnd(12,30),disc=rnd(2,8),n=rnd(2,5),ans=(price-disc)*n;return{q:"一個 "+price+" 元，特價便宜 "+disc+" 元，買 "+n+" 個要付多少元？",ans,e:price+"−"+disc+"＝"+(price-disc)+"，×"+n+"＝"+ans+"。",f:x=>x+"元"};},
      ()=>{const a=rnd(3,8),b=rnd(2,6),extra=rnd(2,9),ans=a*b+extra;return{q:"1 條巧克力有 "+a+" 顆，買了 "+b+" 條，又拿到 "+extra+" 顆，共有幾顆？",ans,e:a+"×"+b+"＝"+(a*b)+"，＋"+extra+"＝"+ans+"。",f:x=>x+"顆"};},
      ()=>{const per=rnd(6,12),box=rnd(2,4),total=per*box,give=rnd(2,Math.min(total-1,9)),ans=total-give;return{q:"1 盒有 "+per+" 顆，買了 "+box+" 盒，送人 "+give+" 顆，還剩幾顆？",ans,e:per+"×"+box+"＝"+total+"，−"+give+"＝"+ans+"。",f:x=>x+"顆"};}
    ];
    const t=pick(T)();
    return mcq(t.q, t.ans, [t.ans+pick([-10,10]), t.ans+pick([-2,-1,1,2])], t.e, 'chal', t.f);
  })
};

const BASIC_KEEP = 3;   /* 基礎題當暖身：每次隨機抽幾題 */
const ROUND_SIZE = 12;  /* 每一輪大約出幾題 */
function startUnit(u){
  state.unit = u;
  const tag = (arr,lv)=>shuffle(arr||[]).map(x=>Object.assign({lv}, x));
  const basics = tag(u.levels.basic,"basic").slice(0, BASIC_KEEP);
  let harder = [...tag(u.levels.adv,"adv"), ...tag(u.levels.chal,"chal")];
  if(GEN[u.id]) harder = harder.concat(GEN[u.id]());
  harder = shuffle(harder).slice(0, Math.max(ROUND_SIZE - basics.length, 4));
  const all = [...basics, ...harder];
  state.qlist = all.map(q=>{
    if(q.w) return {type:"write", lv:q.lv, q:q.q, ans:q.ans, e:q.e};
    if(q.fix) return {type:"fixchar", lv:q.lv, s:q.s, bad:q.bad, ans:q.ans, e:q.e};
    if(q.two){
      const c1=q.o1[q.a1], s1=shuffle(q.o1), c2=q.o2[q.a2], s2=shuffle(q.o2);
      return {type:"two", lv:q.lv, q1:q.q1, o1:s1, a1:s1.indexOf(c1), e1:q.e1,
              q2:q.q2, o2:s2, a2:s2.indexOf(c2), e2:q.e2, vis:q.vis};
    }
    const correctVal = q.o[q.a];
    const opts = shuffle(q.o);
    return {type:"choice", lv:q.lv, q:q.q, o:opts, a:opts.indexOf(correctVal), e:q.e, vis:q.vis};
  });
  state.idx = 0; state.correct = 0;
  show("screenQuiz");
  renderQ();
}

/* ---- 兩步驟讀題題（先讀懂，再計算）---- */
function renderTwoStage(){
  const q = state.qlist[state.idx];
  const stage = state.twoStage;
  state.answered = false;
  $("qtext").textContent = (stage===1 ? "🔍 第 1 步｜先讀懂：" : "🧮 第 2 步｜再計算：") + (stage===1 ? q.q1 : q.q2);
  $("qvisual").innerHTML = (stage===2 && q.vis) ? renderVisual(q.vis) : "";
  const fb = $("feedback"); fb.className="feedback"; fb.innerHTML="";
  $("nextBtn").classList.remove("show");
  const opts = (stage===1 ? q.o1 : q.o2);
  const el = $("opts"); el.innerHTML = "";
  const labels = ["A","B","C","D"];
  opts.forEach((opt,i)=>{
    const b = document.createElement("button");
    b.className = "opt";
    b.innerHTML = '<span class="badge">'+labels[i]+'</span><span>'+opt+'</span>';
    b.onclick = ()=>chooseTwo(i,b);
    el.appendChild(b);

}
function chooseTwo(i,btn){
  if(state.answered) return;
  state.answered = true;
  const q = state.qlist[state.idx];
  const stage = state.twoStage;
  const ans = (stage===1 ? q.a1 : q.a2);
  const exp = (stage===1 ? q.e1 : q.e2);
  const opts = (stage===1 ? q.o1 : q.o2);
  $("opts").querySelectorAll(".opt").forEach((b,idx)=>{
    b.style.pointerEvents="none";
    if(idx===ans) b.classList.add("correct");
    else if(idx===i) b.classList.add("wrong");
    else b.classList.add("dim");
  });
  const fb = $("feedback");
  if(i===ans){
    beep("good"); confetti(btn);
    fb.className = "feedback good show";
    fb.innerHTML = (stage===1 ? '🔍 讀對了！' : '🎉 '+PRAISE[Math.floor(Math.random()*PRAISE.length)]) + '<span class="explain">'+exp+'</span>';
  }else{
    state.twoOK = false;
    beep("bad");
    fb.className = "feedback bad show";
    fb.innerHTML = '💡 正確答案是 <b>'+opts[ans]+'</b>。'+(stage===1?'再讀一次題目，看清楚關鍵的字！':CHEER[Math.floor(Math.random()*CHEER.length)])+'<span class="explain">'+exp+'</span>';
  }
  $("nextBtn").textContent = (stage===1 ? "下一步 →" : "下一題 →");
  $("nextBtn").classList.add("show");
}

/* ---- 手寫板（觸控筆 / 手指 / 滑鼠）---- */
let pad = {ctx:null, drawing:false, mode:"ink", w:0, h:0, bound:false};
function setupPad(){
  const c = $("padCanvas");
  const rect = c.getBoundingClientRect();
  if(rect.width===0){ requestAnimationFrame(setupPad); return; }
  const dpr = window.devicePixelRatio || 1;
  c.width = Math.round(rect.width*dpr);
  c.height = Math.round(rect.height*dpr);
  const ctx = c.getContext("2d");
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.lineCap = "round"; ctx.lineJoin = "round";
  pad.ctx = ctx; pad.w = rect.width; pad.h = rect.height;
  if(!pad.bound){ bindPad(c); pad.bound = true; }
  setPen("ink");
}
function setPen(m){
  pad.mode = m;
  document.querySelectorAll(".pentool[data-pen]").forEach(b=>b.classList.toggle("on", b.dataset.pen===m));
}
function padPos(c,e){ const r=c.getBoundingClientRect(); return {x:e.clientX-r.left, y:e.clientY-r.top, p:e.pressure||0}; }
function styleFor(pos){
  const ctx = pad.ctx;
  if(pad.mode==="erase"){ ctx.globalCompositeOperation="destination-out"; ctx.lineWidth=28; }
  else { ctx.globalCompositeOperation="source-over"; ctx.strokeStyle="#2b3a55"; ctx.lineWidth = pos.p>0 ? 3+pos.p*9 : 6; }
}
function bindPad(c){
  c.addEventListener("pointerdown", e=>{
    e.preventDefault(); c.setPointerCapture(e.pointerId);
    pad.drawing=true; const pos=padPos(c,e); styleFor(pos);
    pad.ctx.beginPath(); pad.ctx.moveTo(pos.x,pos.y); pad.ctx.lineTo(pos.x+0.1,pos.y+0.1); pad.ctx.stroke();
  });
  c.addEventListener("pointermove", e=>{
    if(!pad.drawing) return; e.preventDefault();
    const pos=padPos(c,e); styleFor(pos);
    pad.ctx.lineTo(pos.x,pos.y); pad.ctx.stroke();
    pad.ctx.beginPath(); pad.ctx.moveTo(pos.x,pos.y);
  });
  const end = ()=>{ pad.drawing=false; };
  c.addEventListener("pointerup", end);
  c.addEventListener("pointercancel", end);
  c.addEventListener("pointerleave", end);
}
function clearPad(){ if(pad.ctx) pad.ctx.clearRect(0,0,pad.w,pad.h); }
document.querySelectorAll(".pentool[data-pen]").forEach(b=> b.onclick=()=>setPen(b.dataset.pen));
$("clearPad").onclick = clearPad;
$("revealBtn").onclick = ()=>{
  const q = state.qlist[state.idx];
  $("revealBtn").classList.add("hide");
  const ab = $("answerBox");
  ab.classList.remove("hide");
  ab.innerHTML = '<div class="anslbl">正確答案是</div>'+
    '<div class="ansbig">'+q.ans+'</div>'+
    '<div class="ansexp">'+(q.e||"")+'</div>'+
    '<div class="selfcheck">'+
      '<button class="sc-ok" id="scOk">✅ 我寫對了</button>'+
      '<button class="sc-retry" id="scRetry">🔁 再寫一次</button>'+
    '</div>';
  $("scOk").onclick = ()=>{ state.correct++; $("scoreLbl").textContent="⭐ "+state.correct; beep("good"); confetti(); goNext(); };
  $("scRetry").onclick = ()=>{ clearPad(); ab.classList.add("hide"); $("revealBtn").classList.remove("hide"); };
};

function goNext(){
  if(TTS) window.speechSynthesis.cancel();
  const cur = state.qlist[state.idx];
  if(cur && cur.type==="two"){
    if(state.twoStage===1){ state.twoStage=2; renderTwoStage(); return; }
    if(state.twoOK){ state.correct++; $("scoreLbl").textContent = "⭐ "+state.correct; } /* 兩步都對才得分 */
  }
  state.idx++;
  if(state.idx>=state.qlist.length) finish();
  else renderQ();
}
$("nextBtn").onclick = goNext;

/* ---- 結算 ---- */
function finish(){
  if(TTS) window.speechSynthesis.cancel();
  const total = state.qlist.length, c = state.correct;
  const pct = c/total;
  $("bar").style.width = "100%";
  let stars = pct>=1?5 : pct>=0.8?4 : pct>=0.6?3 : pct>=0.4?2 : 1;
  $("resStars").textContent = "⭐".repeat(stars) + "☆".repeat(5-stars);
  $("resScore").textContent = "答對 "+c+" / "+total+" 題";
  let emoji, title, msg;
  if(pct>=1){ emoji="🏆"; title="全部答對！太厲害了！"; msg="你是二年級小高手，給你五顆星！"; }
  else if(pct>=0.8){ emoji="🎉"; title="表現超棒！"; msg="只差一點點就滿分囉，繼續加油！"; }
  else if(pct>=0.6){ emoji="😀"; title="做得很好！"; msg="再練習幾次，一定會更厲害！"; }
  else if(pct>=0.4){ emoji="💪"; title="有進步喔！"; msg="不要灰心，多練習就會越來越棒！"; }
  else { emoji="🌱"; title="再試一次！"; msg="看不懂題目可以按「念題目」聽聽看，你一定可以的！"; }
  $("resEmoji").textContent = emoji;
  $("resTitle").textContent = title;
  $("resMsg").textContent = msg;
  if(pct>=0.8){ for(let i=0;i<14;i++) setTimeout(()=>confetti(),i*70); beep("good"); }
  show("screenResult");
}
$("againBtn").onclick = ()=>startUnit(state.unit);
$("otherUnitBtn").onclick = ()=>{ renderUnits(); show("screenUnits"); };

/* ---- 慶祝小動畫 ---- */
function confetti(near){
  const emojis = ["🎉","⭐","🌟","✨","🎊","💛","🏅"];
  const e = document.createElement("div");
  e.className = "floaty";
  e.textContent = emojis[Math.floor(Math.random()*emojis.length)];
  let x, y;
  if(near){ const r = near.getBoundingClientRect(); x = r.left + r.width*Math.random(); y = r.top; }
  else { x = Math.random()*window.innerWidth; y = window.innerHeight*0.4 + Math.random()*100; }
  e.style.left = x + "px"; e.style.top = y + "px";
  document.body.appendChild(e);
  setTimeout(()=>e.remove(),1200);
}

/* ---- 開關（音效 / 自動念題）---- */
function applyToggles(){
  $("soundBtn").firstChild.textContent = soundOn ? "🔊" : "🔇";
  $("soundBtn").classList.toggle("off", !soundOn);
  $("autoReadBtn").firstChild.textContent = autoRead ? "📢" : "🔕";
  $("autoReadBtn").classList.toggle("off", !autoRead);
  if(!TTS) $("autoReadBtn").classList.add("hide");
}
$("soundBtn").onclick = ()=>{ soundOn=!soundOn; applyToggles(); try{localStorage.setItem('snd', soundOn?'1':'0');}catch(e){} };
$("autoReadBtn").onclick = ()=>{ autoRead=!autoRead; applyToggles(); try{localStorage.setItem('aread', autoRead?'1':'0');}catch(e){} if(!autoRead && TTS) window.speechSynthesis.cancel(); };
applyToggles();

/* ---- 標題每次隨機換圖案 ---- */
function randomTitle(){
  const pool=["🌈","⭐","🚀","🦄","🎨","🏆","🌟","🎉","🍭","🐯","🦊","🌸","🎈","🧩","💎","🍀","🐬","🐰","🌞","🎪","🦁","🐠","🍎","✨"];
  const a=pick(pool); let b=pick(pool); if(b===a) b=pick(pool);
  $("mainTitle").textContent = a+" 二年級期末闖關 "+b;
}
randomTitle();

/* ---- 啟動 ---- */
setSubject("chinese");
<\/script>

</script>
<script id="srcExam" type="text/plain"><!DOCTYPE html>

  .qnum{display:inline-block; background:var(--pink); color:#fff; font-weight:800; border-radius:10px; padding:2px 10px; font-size:14px; margin-bottom:10px;}

    padding:16px; font-size:18px; color:#fff; box-shadow:0 4px 0 rgba(0,0,0,.13); margin-top:10px;}

  footer{text-align:center; color:#aab; font-size:12px; margin-top:24px;}
</style>

<div class="wrap">
  <header>

      <div class="rscore" id="resScore"></div>
      <div class="msg" id="resMsg"></div>

  const p = all.find(x=>x.id===pid); if(!p||!p.qs) return;
  for(const k in map){ const q = p.qs.find(q=>q.n===k); if(q) q.cont = map[k]; }
}

/* ========================= 引擎 ========================= */
const $ = id => document.getElementById(id);
let state = { paper:null, idx:0, results:[] };
let PAPERS = PAPERS_MATH, subject = "math";
function setSubject(s){
  subject = s;
  PAPERS = (s==="math") ? PAPERS_MATH : PAPERS_CN;
  $("subMath").classList.toggle("off", s!=="math");
  $("subCN").classList.toggle("off", s!=="cn");
  renderHome();
  show("screenHome");
}

function show(s){ ["screenHome","screenExam","screenResult"].forEach(x=>$(x).classList.add("hide")); $(s).classList.remove("hide"); window.scrollTo(0,0); }

function renderHome(){
  const list = $("paperList"); list.innerHTML = "";
  PAPERS.forEach(p=>{
    const b = document.createElement("button");
    b.className = "pcard" + (p.soon ? " soon" : "");
    const cnt = p.soon ? "準備中" : (p.qs.length + " 題");
    b.innerHTML = '<div class="pico">'+p.icon+'</div>'+
      '<div class="pmain"><div class="pname">'+p.school+'</div><div class="pmeta">'+p.year+'　'+cnt+'</div></div>'+
      '<div class="parrow">'+(p.soon?"準備中":"▶")+'</div>';
    if(!p.soon) b.onclick = ()=>startPaper(p);
    list.appendChild(b);
  });
}

function startPaper(p){
  state.paper = p; state.idx = 0;
  state.results = p.qs.map(()=>null);
  show("screenExam");
  renderQ();
}
$("examBack").onclick = ()=>{ renderHome(); show("screenHome"); };

function totalScore(){
  let got=0, tot=0;
  state.results.forEach(r=>{ if(r){ got+=r.got; } });
  state.paper.qs.forEach(q=> tot += qPoints(q));
  return {got, tot};
}
function qPoints(q){ if(q.type==="fill") return q.blanks.length; if(q.type==="fix") return 2; return 1; }

function renderQ(){
  const q = state.paper.qs[state.idx];
  const total = state.paper.qs.length;
  const done = state.results[state.idx];
  $("qsec").textContent = state.paper.school + "　" + state.paper.year;
  $("qnum").textContent = "第 " + (state.idx+1) + " / " + total + " 題　(" + q.n + ")";
  const ctx = $("qctx");
  if(q.cont && state.idx>0){
    const n = (q.cont===true) ? 1 : q.cont;
    let html = '<div class="ctxlbl">📌 上一題的內容（給你參考）</div>';
    for(let k=Math.max(0,state.idx-n); k<state.idx; k++){
      const p = state.paper.qs[k];
      html += '<div class="ctxq">（'+p.n+'）'+p.q+'</div>' + (p.vis ? solidHTML(p.vis) : "");
    }
    ctx.innerHTML = html; ctx.classList.remove("hide");
  } else { ctx.classList.add("hide"); ctx.innerHTML = ""; }
  $("qtext").textContent = q.q;
  $("qvisual").innerHTML = q.vis ? solidHTML(q.vis) : "";
  $("bar").style.width = (state.idx/total*100) + "%";
  const sc = totalScore(); $("scoreLbl").textContent = "⭐ " + sc.got + "/" + sc.tot;
  ["opts","fills","selfbtns"].forEach(x=>$(x).classList.add("hide"));
  $("checkBtn").classList.add("hide");
  $("checkBtn").textContent = "✏️ 對答案";
  const fb = $("feedback"); fb.className = "feedback"; fb.innerHTML = ""; fb.style = "";
  $("prevBtn").disabled = (state.idx===0);
  $("nextBtn").disabled = !done;
  $("nextBtn").textContent = (state.idx===total-1) ? "看成績 🏁" : "下一題 →";

  if(q.type==="mcq" || q.type==="tf") renderChoice(q, done);
  else if(q.type==="fill") renderFill(q, done);
  else if(q.type==="fix") renderFix(q, done);
  else renderSelf(q, done);
}

function renderChoice(q, done){
  const opts = $("opts"); opts.classList.remove("hide"); opts.innerHTML = "";
  const list = (q.type==="tf") ? ["⭕ 對","❌ 錯"] : q.o;
  const ans = (q.type==="tf") ? (q.a ? 0 : 1) : q.a;
  const labels = ["A","B","C","D"];
  list.forEach((opt,i)=>{
    const b = document.createElement("button");
    b.className = "opt";
    b.innerHTML = '<span class="badge">'+labels[i]+'</span><span>'+opt+'</span>';
    if(done){
      b.style.pointerEvents="none";
      if(i===ans) b.classList.add("correct");
      else if(i===done.pick) b.classList.add("wrong");
      else b.classList.add("dim");
    } else {
      b.onclick = ()=>{
        opts.querySelectorAll(".opt").forEach((x,xi)=>{ x.style.pointerEvents="none";
          if(xi===ans) x.classList.add("correct"); else if(xi===i) x.classList.add("wrong"); else x.classList.add("dim"); });
        const ok = (i===ans);
        state.results[state.idx] = {got: ok?1:0, pick:i};
        showFB(ok, ok?"答對了！":("正確答案是 "+list[ans]), q.e);
        afterAnswer();
      };
    }
    opts.appendChild(b);
  });
  if(done) showFB(done.got>0, done.got>0?"答對了！":("正確答案是 "+list[ans]), q.e);
}

function renderFill(q, done){
  const box = $("fills"); box.classList.remove("hide"); box.innerHTML = "";
  q.blanks.forEach((bk,i)=>{
    const row = document.createElement("div"); row.className = "frow";
    row.innerHTML = (bk.pre?('<span>'+bk.pre+'</span>'):'') +
      '<input class="fin" id="fin'+i+'" autocomplete="off">' +
      (bk.suf?('<span>'+bk.suf+'</span>'):'');
    box.appendChild(row);
  });
  if(done){
    q.blanks.forEach((bk,i)=>{ const el=$("fin"+i); el.value=done.vals[i]; el.disabled=true;
      el.classList.add(done.marks[i]?"ok":"bad"); });
    showFB(done.got===qPoints(q), fillAnsText(q), q.e);
  } else {
    $("checkBtn").classList.remove("hide");
    $("checkBtn").onclick = ()=>{
      const vals=[], marks=[]; let got=0;
      q.blanks.forEach((bk,i)=>{
        const el=$("fin"+i); const v=el.value; vals.push(v);
        const ok = checkBlank(bk, v); marks.push(ok); if(ok) got++;
        el.disabled=true; el.classList.add(ok?"ok":"bad");
      });
      state.results[state.idx] = {got, vals, marks};
      $("checkBtn").classList.add("hide");
      showFB(got===q.blanks.length, fillAnsText(q), q.e);
      afterAnswer();
    };
  }
}
function fillAnsText(q){
  const a = q.blanks.map(bk=> (Array.isArray(bk.ans)?bk.ans[0]:bk.ans) + (bk.suf||"") ).join("、");
  return "正確答案：" + a;
}

function renderSelf(q, done){
  const ansText = Array.isArray(q.ans) ? q.ans[0] : q.ans;
  const box = $("fills"); box.classList.remove("hide");
  if(done){
    box.innerHTML = '<div class="frow"><input class="fin finwide" id="fin0" disabled></div>';
    const el = $("fin0"); el.value = done.val || ""; el.classList.add(done.got>0?"ok":"bad");
    showFB(done.got>0, "參考答案："+ansText, q.e);
    return;
  }
  box.innerHTML = '<div class="frow"><input class="fin finwide" id="fin0" autocomplete="off" placeholder="在這裡打答案"></div>'
    + '<div class="orwrite">或用電腦筆／手指寫 ✍️</div>' + padHTML("pad0");
  setupPad("pad0");
  $("checkBtn").classList.remove("hide");
  $("checkBtn").textContent = "✏️ 對答案";
  $("checkBtn").onclick = ()=>{
    const el = $("fin0"); const v = el ? el.value : "";
    const acc = Array.isArray(q.ans) ? q.ans : [q.ans];
    const auto = v.trim()!=="" && acc.some(a=>norm(a)===norm(v));
    if(el) el.disabled = true;
    $("checkBtn").classList.add("hide");
    if(auto){
      if(el) el.classList.add("ok");
      state.results[state.idx] = {got:1, val:v};
      showFB(true, "參考答案："+ansText, q.e);
      afterAnswer();
    } else {
      if(el && v.trim()!=="") el.classList.add("bad");
      const fb = $("feedback");
      fb.className = "feedback show";
      fb.style.background = "#f0f6ff"; fb.style.border = "2px solid #b9d6ef"; fb.style.color = "#2f6690";
      fb.innerHTML = '👀 看看你寫的對不對？<span class="ans">參考答案：'+ansText+'</span>' + (q.e?('<span class="exp">'+q.e+'</span>'):"");
      $("selfbtns").classList.remove("hide");
      $("selfOk").onclick = ()=>{ if(el){el.classList.remove("bad"); el.classList.add("ok");} state.results[state.idx]={got:1, val:v}; $("selfbtns").classList.add("hide"); fb.style="";  afterAnswer(); };
      $("selfNo").onclick = ()=>{ state.results[state.idx]={got:0, val:v}; $("selfbtns").classList.add("hide"); fb.style=""; afterAnswer(); };
    }
  };
}

/* 立體形體 SVG（數學用）*/
function solidHTML(v){ return '<div class="solidbox">'+svgSolid(v.kind)+'</div>'; }
function svgSolid(kind){
  const c='#9ec9e8', c2='#bfe0f4', c3='#7fb6dd', st='#3a7aa6';
  if(kind==='cube') return '<svg width="120" height="120" viewBox="0 0 125 125">'+
    '<polygon points="25,48 80,48 80,103 25,103" fill="'+c+'" stroke="'+st+'" stroke-width="2.5"/>'+
    '<polygon points="25,48 50,24 105,24 80,48" fill="'+c2+'" stroke="'+st+'" stroke-width="2.5"/>'+
    '<polygon points="80,48 105,24 105,79 80,103" fill="'+c3+'" stroke="'+st+'" stroke-width="2.5"/></svg>';
  return '<svg width="150" height="115" viewBox="0 0 150 115">'+
    '<polygon points="20,45 105,45 105,95 20,95" fill="'+c+'" stroke="'+st+'" stroke-width="2.5"/>'+
    '<polygon points="20,45 45,22 130,22 105,45" fill="'+c2+'" stroke="'+st+'" stroke-width="2.5"/>'+
    '<polygon points="105,45 130,22 130,72 105,95" fill="'+c3+'" stroke="'+st+'" stroke-width="2.5"/></svg>';
}

/* 手寫板（電腦筆 / 手指 / 滑鼠）*/
function padHTML(id){
  return '<div class="penbar">'
    + '<button type="button" class="pentool on" data-pen="ink">✏️ 筆</button>'
    + '<button type="button" class="pentool" data-pen="erase">🧽 橡皮擦</button>'
    + '<button type="button" class="pentool" data-pen="clear">🗑️ 清除</button>'
    + '</div><canvas id="'+id+'" class="padcanvas"></canvas>';
}
function setupPad(id){
  const c = document.getElementById(id); if(!c) return;
  const rect = c.getBoundingClientRect();
  if(rect.width===0){ requestAnimationFrame(()=>setupPad(id)); return; }
  const dpr = window.devicePixelRatio || 1;
  c.width = Math.round(rect.width*dpr); c.height = Math.round(rect.height*dpr);
  const ctx = c.getContext("2d"); ctx.setTransform(dpr,0,0,dpr,0,0); ctx.lineCap="round"; ctx.lineJoin="round";
  const W = rect.width, H = rect.height;
  let mode = "ink", drawing = false;
  c.parentNode.querySelectorAll(".pentool").forEach(b=>{
    b.onclick = ()=>{
      const m = b.dataset.pen;
      if(m==="clear"){ ctx.clearRect(0,0,W,H); return; }
      mode = m;
      c.parentNode.querySelectorAll('.pentool[data-pen="ink"],.pentool[data-pen="erase"]').forEach(x=>x.classList.toggle("on", x.dataset.pen===m));
    };
  });
  const pos = e=>{ const r=c.getBoundingClientRect(); return {x:e.clientX-r.left, y:e.clientY-r.top, p:e.pressure||0}; };
  const style = p=>{ if(mode==="erase"){ ctx.globalCompositeOperation="destination-out"; ctx.lineWidth=26; }
    else { ctx.globalCompositeOperation="source-over"; ctx.strokeStyle="#2b3a55"; ctx.lineWidth = p.p>0 ? 3+p.p*9 : 6; } };
  c.addEventListener("pointerdown", e=>{ e.preventDefault(); c.setPointerCapture(e.pointerId); drawing=true; const p=pos(e); style(p); ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x+0.1,p.y+0.1); ctx.stroke(); });
  c.addEventListener("pointermove", e=>{ if(!drawing) return; e.preventDefault(); const p=pos(e); style(p); ctx.lineTo(p.x,p.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(p.x,p.y); });
  const end = ()=>{ drawing=false; };
  c.addEventListener("pointerup", end); c.addEventListener("pointercancel", end); c.addEventListener("pointerleave", end);
}

/* 改錯字：圈錯字 + 寫正確的字 */
function renderFix(q, done){
  const box = $("fills"); box.classList.remove("hide");
  let html = '<div class="fixinstr">👆 先點一下你覺得寫錯的字（會圈起來），再把正確的字打出來或用筆寫。</div>'
    + '<div class="fixsentence" id="fixSent"></div>'
    + '<div class="frow" style="margin-top:12px;">正確的字：<input class="fin" id="finFix" autocomplete="off" maxlength="2" style="width:80px;"></div>';
  if(!done) html += '<div class="orwrite">或用電腦筆／手指寫 ✍️</div>' + padHTML("padFix");
  box.innerHTML = html;
  const sent = $("fixSent"); const chars = [...q.s];
  let pickedIdx = done ? done.pick : -1;
  chars.forEach((ch,idx)=>{
    const sp = document.createElement("span"); sp.className = "fixchar"; sp.textContent = ch;
    if(done){
      sp.style.pointerEvents = "none";
      if(ch===q.bad) sp.classList.add("isbad");
      if(idx===pickedIdx && ch!==q.bad) sp.classList.add("nope");
    } else {
      sp.onclick = ()=>{ sent.querySelectorAll(".fixchar").forEach(x=>x.classList.remove("circled")); sp.classList.add("circled"); pickedIdx = idx; };
    }
    sent.appendChild(sp);
  });
  if(done){
    const fi = $("finFix"); if(fi){ fi.value = done.val||""; fi.disabled = true; fi.classList.add(done.charOK?"ok":"bad"); }
    showFixFB(q, {circleOK:(done.pick>=0 && chars[done.pick]===q.bad), charOK:done.charOK});
    return;
  }
  setupPad("padFix");
  $("checkBtn").classList.remove("hide"); $("checkBtn").textContent = "✏️ 對答案";
  $("checkBtn").onclick = ()=>{
    const circleOK = (pickedIdx>=0 && chars[pickedIdx]===q.bad);
    const v = $("finFix").value;
    const charAuto = (v.trim()!=="" && norm(v)===norm(q.ans));
    sent.querySelectorAll(".fixchar").forEach((x,i)=>{ x.style.pointerEvents="none"; if(chars[i]===q.bad) x.classList.add("isbad"); if(i===pickedIdx && chars[i]!==q.bad) x.classList.add("nope"); });
    $("finFix").disabled = true;
    $("checkBtn").classList.add("hide");
    if(charAuto){
      $("finFix").classList.add("ok");
      state.results[state.idx] = {got:(circleOK?1:0)+1, pick:pickedIdx, val:v, charOK:true};
      showFixFB(q, {circleOK, charOK:true});
      afterAnswer();
    } else {
      if(v.trim()!=="") $("finFix").classList.add("bad");
      showFixFB(q, {circleOK, charOK:false});
      $("selfbtns").classList.remove("hide");
      $("selfOk").onclick = ()=>{ $("finFix").classList.remove("bad"); $("finFix").classList.add("ok"); state.results[state.idx]={got:(circleOK?1:0)+1, pick:pickedIdx, val:v, charOK:true}; $("selfbtns").classList.add("hide"); showFixFB(q,{circleOK,charOK:true}); afterAnswer(); };
      $("selfNo").onclick = ()=>{ state.results[state.idx]={got:(circleOK?1:0), pick:pickedIdx, val:v, charOK:false}; $("selfbtns").classList.add("hide"); afterAnswer(); };
    }
  };
}
function showFixFB(q, r){
  const both = r.circleOK && r.charOK;
  const fb = $("feedback"); fb.style = "";
  fb.className = "feedback show " + (both ? "good" : "bad");
  let head = both ? "🎉 圈對也寫對了！" : (r.circleOK ? "✅ 圈對了！但正確的字要再看看：" : (r.charOK ? "✅ 字寫對了！但錯字要圈這個：" : "💡 再看一次："));
  fb.innerHTML = head + '<span class="ans">錯字是「'+q.bad+'」，要改成「'+q.ans+'」。</span>' + (q.e?('<span class="exp">'+q.e+'</span>'):"");
}
function checkBlank(bk, v){
  const acc = Array.isArray(bk.ans)?bk.ans:[bk.ans];
  return acc.some(a=>norm(a)===norm(v));
}
function norm(s){
  return String(s).trim()
    .replace(/[０-９]/g, d=>String.fromCharCode(d.charCodeAt(0)-65248))
    .replace(/／/g,"/").replace(/\s+/g,"")
    .replace(/[（）()]/g,"").toLowerCase();
}
function showFB(good, ansLine, exp){
  const fb=$("feedback");
  fb.className = "feedback show " + (good?"good":"bad");
  fb.innerHTML = (good?"🎉 ":"💡 ") + (good?"很棒！":"再看一次：") +
    '<span class="ans">'+ansLine+'</span>' + (exp?('<span class="exp">'+exp+'</span>'):"");
}
function afterAnswer(){
  const sc=totalScore(); $("scoreLbl").textContent = "⭐ "+sc.got+"/"+sc.tot;
  $("nextBtn").disabled = false;
}

$("prevBtn").onclick = ()=>{ if(state.idx>0){ state.idx--; renderQ(); } };
$("nextBtn").onclick = ()=>{
  if(state.idx < state.paper.qs.length-1){ state.idx++; renderQ(); }
  else finish();
};

function finish(){
  const sc = totalScore();
  $("bar").style.width = "100%";
  const pct = sc.tot>0 ? sc.got/sc.tot : 0;
  let stars = pct>=1?5 : pct>=0.8?4 : pct>=0.6?3 : pct>=0.4?2 : 1;
  $("resStars").textContent = "⭐".repeat(stars) + "☆".repeat(5-stars);
  $("resScore").textContent = "答對 " + sc.got + " / " + sc.tot + " 分";
  let emoji,title,msg;
  if(pct>=1){ emoji="🏆"; title="滿分！太厲害了！"; msg="整份都對，你是國語小高手！"; }
  else if(pct>=0.8){ emoji="🎉"; title="表現超棒！"; msg="只錯一點點，繼續加油！"; }
  else if(pct>=0.6){ emoji="😀"; title="做得很好！"; msg="多讀幾次題目會更棒！"; }
  else if(pct>=0.4){ emoji="💪"; title="有進步喔！"; msg="把題目讀清楚再作答，會更準！"; }
  else { emoji="🌱"; title="再考一次！"; msg="慢慢來，一題一題看清楚問什麼。"; }
  $("resEmoji").textContent=emoji; $("resTitle").textContent=title; $("resMsg").textContent=msg;
  show("screenResult");
}
$("againBtn").onclick = ()=>startPaper(state.paper);
$("homeBtn").onclick = ()=>{ renderHome(); show("screenHome"); };

$("subMath").onclick = ()=>setSubject("math");
$("subCN").onclick = ()=>setSubject("cn");
setSubject("math");
